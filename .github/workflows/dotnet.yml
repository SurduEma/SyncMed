name: ASP.NET Core 8 CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Gaseste si ruleaza proiectul automat
      run: |
        # Caută automat orice fișier .sln în tot repository-ul
        SLN_FILE=$(find . -name "*.sln" | head -n 1)
        
        # Verifică dacă a găsit ceva
        if [ -z "$SLN_FILE" ]; then
          echo "EROARE: Nu am găsit niciun fișier .sln pe GitHub! Probabil nu a fost urcat din cauza .gitignore."
          exit 1
        fi
        
        echo "Am găsit proiectul exact aici: $SLN_FILE"
        
        # Rulează comenzile direct pe fișierul găsit, indiferent de cale
        dotnet restore "$SLN_FILE"
        dotnet build "$SLN_FILE" --no-restore --configuration Release